<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHART — スロ幹</title>
  <meta name="description" content="Discord連載小説「スロ幹」の公式ファンサイト。あらすじ・キャラクター・人物相関図を公開。">

  <!-- OGP / Twitter Card -->
  <meta property="og:title" content="CHART — スロ幹">
  <meta property="og:description" content="Discord連載小説「スロ幹」の公式ファンサイト。あらすじ・キャラクター・人物相関図を公開。">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://sasukemaru13.github.io/surokan-site/assets/ogp.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://sasukemaru13.github.io/surokan-site/assets/ogp.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* ================================================
       CHARTページ固有スタイル
       ================================================ */

    /* 横スクロールラッパー（スマホ対応の核） */
    .chart-scroll-outer {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(244,168,32,0.3) transparent;
    }
    .chart-scroll-outer::-webkit-scrollbar {
      height: 4px;
    }
    .chart-scroll-outer::-webkit-scrollbar-thumb {
      background: rgba(244,168,32,0.35);
      border-radius: 2px;
    }

    /* キャンバス本体：min-widthで1300px以下でも崩れない */
    .chart-canvas {
      min-width: 1300px;
      width: 100%;
      position: relative;
    }

    /* スクロールヒント（スマホのみ表示） */
    .chart-scroll-hint {
      display: none;
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    @media (max-width: 768px) {
      .chart-scroll-hint { display: block; }
    }

    /* SVG本体 */
    /* 相関図画像（インフォグラフィック） */
    .chart-img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }

    /* ---- グループラベル ---- */
    .group-label {
      font-family: 'Anton', sans-serif;
      font-size: 28px;
      letter-spacing: 0.14em;
      fill: rgba(244,168,32,0.45);
    }

    /* ---- 主要ノード ---- */
    .node-name {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 900;
      font-size: 28px;
      fill: var(--text, #E8EDF4);
      text-anchor: middle;
    }
    .node-name-main {
      font-size: 36px;
    }

    .node-role {
      font-family: 'Anton', sans-serif;
      font-size: 18px;
      letter-spacing: 0.12em;
      fill: rgba(244,168,32,0.8);
      text-anchor: middle;
    }

    /* 準主要ノード */
    .node-sub-name {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 22px;
      fill: #7A94B0;
      text-anchor: middle;
    }
    .node-sub-role {
      font-family: 'Anton', sans-serif;
      font-size: 17px;
      letter-spacing: 0.1em;
      fill: rgba(244,168,32,0.5);
      text-anchor: middle;
    }

    /* 名前のみチップ */
    .node-chip-text {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 21px;
      fill: #5a7290;
      text-anchor: middle;
      dominant-baseline: central;
    }

    /* 関係線ラベル */
    .edge-label {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      font-size: 21px;
      fill: rgba(244,168,32,0.9);
      text-anchor: middle;
      dominant-baseline: central;
    }
    .edge-label-muted {
      font-size: 18px;
      fill: rgba(122,148,176,0.75);
    }
    .edge-label-rival {
      font-size: 19px;
      fill: #e05a2b;
    }

    /* ポップインアニメ（ノード） */
    @keyframes node-pop {
      0%   { opacity: 0; transform: scale(0.6); }
      80%  { opacity: 1; transform: scale(1.06); }
      100% { opacity: 1; transform: scale(1); }
    }
    .node-group {
      opacity: 0;
      transform-origin: center;
    }
    .node-group.is-visible {
      animation: node-pop 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .delay-1  { animation-delay: 0.05s; }
    .delay-2  { animation-delay: 0.10s; }
    .delay-3  { animation-delay: 0.15s; }
    .delay-4  { animation-delay: 0.20s; }
    .delay-5  { animation-delay: 0.25s; }
    .delay-6  { animation-delay: 0.30s; }
    .delay-7  { animation-delay: 0.35s; }
    .delay-8  { animation-delay: 0.40s; }
    .delay-9  { animation-delay: 0.45s; }
    .delay-10 { animation-delay: 0.50s; }
    .delay-11 { animation-delay: 0.55s; }
    .delay-12 { animation-delay: 0.60s; }
    .delay-13 { animation-delay: 0.65s; }
    .delay-14 { animation-delay: 0.70s; }

    /* 凡例 */
    .legend-section {
      padding: 32px 0 0;
    }
    .legend-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      justify-content: center;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }
    .legend-line {
      width: 36px;
      height: 2px;
      flex-shrink: 0;
    }
    .legend-line--gold     { background: #F4A820; }
    .legend-line--rival    { background: #e05a2b; }
    .legend-line--muted    { background: #3a5268; }
    .legend-line--dashed   {
      background: repeating-linear-gradient(90deg, #7A94B0 0, #7A94B0 5px, transparent 5px, transparent 9px);
    }
    .legend-arrow {
      width: 0; height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 9px solid #F4A820;
      flex-shrink: 0;
    }
    .legend-arrow--rival { border-left-color: #e05a2b; }
    .legend-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #F4A820;
      flex-shrink: 0;
    }
    .legend-circle--sub {
      border-color: #3a5268;
      background: transparent;
    }

    .legend-heading {
      font-family: 'Anton', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: rgba(244,168,32,0.6);
      text-align: center;
      margin-bottom: 12px;
    }

    /* エッジのフェードイン */
    .edge-group {
      opacity: 0;
      transition: opacity 0.8s ease 0.2s;
    }
    .edge-group.is-visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="site-logo">
        <img src="assets/logo.png" alt="スロ幹" class="header-logo-img">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="メニューを開く" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" id="siteNav">
        <ul>
          <li><a href="index.html">TOP</a></li>
          <li><a href="story.html">STORY</a></li>
          <li><a href="character.html">CHARACTER</a></li>
          <li><a href="chart.html" aria-current="page">CHART</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- ページタイトルバナー -->
    <div class="page-banner">
      <div class="container page-banner-inner">
        <p class="page-banner-ghost" aria-hidden="true">CHART</p>
        <h1 class="page-banner-ja">人物相関図</h1>
        <p class="page-banner-sub">RELATION CHART — FULL STORY</p>
      </div>
    </div>

    <!-- 人物相関図 -->
    <section class="chart-section">
      <span class="section-ghost" aria-hidden="true">RELATION</span>

      <div class="chart-section-wide" style="position: relative; z-index: 1; width: min(1720px, 96vw); margin-inline: auto;">

        <div class="section-heading fade-in">
          <span class="section-heading-en">RELATION CHART</span>
          <span>人物相関図</span>
        </div>

        <!-- スクロールヒント（スマホのみ） -->
        <p class="chart-scroll-hint">&#8592; 左右にスクロールできます &#8594;</p>

        <!-- 相関図（Codex制作インフォグラフィック v6・2400x1600）。タップで原寸表示 -->
        <div class="chart-scroll-outer fade-in fade-in-delay-1">
          <div class="chart-canvas">
            <a href="assets/chart.png" target="_blank" rel="noopener">
              <img src="assets/chart.png" alt="スロ幹 人物相関図（主要7人・全期間俯瞰）" class="chart-img">
            </a>
          </div>
        </div>
        <p style="text-align:center; font-size:0.72rem; color:var(--text-muted); margin-top:14px; letter-spacing:0.08em;">画像をタップすると原寸で表示できます。相関は連載ログに基づく事実のみ。</p>

      </div><!-- /chart-section-wide -->
    </section>

  </main>

  <!-- フッター -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; スロ幹製作委員会</p>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('navToggle');
    const nav    = document.getElementById('siteNav');
    toggle.addEventListener('click', () => {
      const isOpen = nav.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', isOpen);
    });

    // スクロールフェードイン（既存の .fade-in 要素）
    const fadeEls = document.querySelectorAll('.fade-in');

    if ('IntersectionObserver' in window) {
      const fadeObs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            fadeObs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });
      fadeEls.forEach(el => fadeObs.observe(el));
    } else {
      fadeEls.forEach(el => el.classList.add('is-visible'));
    }
  </script>

</body>
</html>
